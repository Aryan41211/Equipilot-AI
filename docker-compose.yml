version: "3.9"

services:
  backend:
    image: equipilot-backend:local
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: equipilot-frontend:local
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "8501:8501"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:9090/healthz', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: equipilot-nginx:local
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "128M"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost/', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
