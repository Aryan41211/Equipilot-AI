# EquiPilot AI - Nginx Configuration
# Production reverse proxy with security headers, rate limiting, and logging

worker_processes auto;
error_log /dev/stdout info;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Custom log format with request ID
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" request_id=$request_id '
                    'upstream=$upstream_addr request_time=$request_time';

    access_log /dev/stdout main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=health_limit:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    # Upstream backends with keepalive
    upstream backend_app {
        server backend:8000;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 30s;
    }

    upstream frontend_app {
        server frontend:8501;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 30s;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Security headers (applied to all responses)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Request-ID $request_id always;

        # Health check endpoint - minimal processing
        location = /health {
            access_log off;
            limit_req zone=health_limit burst=10 nodelay;
            proxy_pass http://backend_app/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Readiness endpoint
        location = /ready {
            access_log off;
            limit_req zone=health_limit burst=10 nodelay;
            proxy_pass http://backend_app/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 3s;
            proxy_read_timeout 3s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Version endpoint
        location = /version {
            access_log off;
            limit_req zone=health_limit burst=10 nodelay;
            add_header Content-Type application/json always;
            add_header X-Request-ID $request_id always;
            return 200 '{"version":"0.1.0","name":"EquiPilot AI"}';
        }

        # Metrics endpoint (internal monitoring)
        location = /metrics {
            access_log off;
            limit_req zone=health_limit burst=5 nodelay;
            proxy_pass http://backend_app/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API routes with strict rate limiting
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://backend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # CORS headers for API
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        }

        # Frontend (Streamlit) with rate limiting
        location / {
            limit_req zone=general_limit burst=50 nodelay;

            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Frontend health endpoint (separate from main frontend location)
        # The frontend container runs a dedicated health check server on port 9090
        location = /healthz {
            access_log off;
            limit_req zone=health_limit burst=10 nodelay;
            proxy_pass http://frontend:9090/healthz;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Deny access to sensitive paths
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}