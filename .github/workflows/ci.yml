# EquiPilot AI — Continuous Integration
# Production-grade CI pipeline: lint, test, build, validate

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # Job 1: Lint & Code Quality
  # ============================================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: |
          echo "Running Ruff linter..."
          ruff check backend/ frontend/ tests/ --output-format=github
        continue-on-error: false

      - name: Run Black formatter check
        run: |
          echo "Running Black formatter check..."
          black --check backend/ frontend/ tests/
        continue-on-error: false

  # ============================================================================
  # Job 2: Test Suite
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || '' }}
      ENVIRONMENT: test
      LOG_LEVEL: ERROR
      LOG_FORMAT: json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ \
            --verbose \
            --tb=short \
            --strict-markers \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -W ignore::DeprecationWarning
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7

