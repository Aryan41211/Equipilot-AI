# EquiPilot AI — Continuous Integration
# Production-grade CI pipeline: lint, test, build, validate

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================================
  # Job 1: Lint & Code Quality
  # ============================================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: |
          echo "Running Ruff linter..."
          ruff check backend/ frontend/ tests/ --output-format=github
        continue-on-error: false

      - name: Run Black formatter check
        run: |
          echo "Running Black formatter check..."
          black --check backend/ frontend/ tests/
        continue-on-error: false

  # ============================================================================
  # Job 2: Test Suite
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-test-placeholder' }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || '' }}
      ENVIRONMENT: test
      LOG_LEVEL: ERROR
      LOG_FORMAT: json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/ \
            --verbose \
            --tb=short \
            --strict-markers \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -W ignore::DeprecationWarning
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
          retention-days: 7

  # ============================================================================
  # Job 3: Docker Build & Validate
  # ============================================================================
  docker:
    name: Docker Build & Validate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          tags: equipilot-ai:ci-backend
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: frontend
          tags: equipilot-ai:ci-frontend
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose configuration
        run: |
          echo "Validating docker-compose.yml..."
          docker compose config --quiet
          echo "docker-compose.yml is valid."

      - name: Validate Dockerfile syntax
        run: |
          echo "Validating Dockerfile..."
          docker build --target production -t equipilot-ai:validate --no-cache-filter=production .
          echo "Dockerfile builds successfully."

      - name: Test health endpoints via Docker image
        run: |
          echo "Starting backend container..."
          docker run -d \
            --name equipilot-test \
            -p 8000:8000 \
            -e OPENAI_API_KEY=sk-test-placeholder \
            -e ENVIRONMENT=test \
            -e BACKEND_RELOAD=false \
            -e LOG_LEVEL=ERROR \
            equipilot-ai:ci-backend

          echo "Waiting for backend to start..."
          sleep 5

          echo "Testing /health endpoint..."
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health \
            | grep 200 || (echo "Health check failed" && exit 1)

          echo "Testing /ready endpoint..."
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready \
            | grep 200 || (echo "Readiness check failed" && exit 1)

          echo "Testing /version endpoint..."
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/version \
            | grep 200 || (echo "Version check failed" && exit 1)

          echo "Testing /metrics endpoint..."
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/metrics \
            | grep 200 || (echo "Metrics check failed" && exit 1)

          echo "All health endpoints respond correctly."

          docker stop equipilot-test
          docker rm equipilot-test

      - name: Validate security headers in Docker image
        run: |
          docker run -d \
            --name equipilot-security-test \
            -p 8001:8000 \
            -e OPENAI_API_KEY=sk-test-placeholder \
            -e ENVIRONMENT=test \
            -e BACKEND_RELOAD=false \
            -e LOG_LEVEL=ERROR \
            equipilot-ai:ci-backend

          sleep 5

          echo "Testing security headers..."
          HEADERS=$(curl -s -I http://localhost:8001/health)
          echo "$HEADERS" | grep -q "X-Content-Type-Options: nosniff" || (echo "Missing X-Content-Type-Options" && exit 1)
          echo "$HEADERS" | grep -q "X-Frame-Options: DENY" || (echo "Missing X-Frame-Options" && exit 1)
          echo "$HEADERS" | grep -q "Strict-Transport-Security" || (echo "Missing Strict-Transport-Security" && exit 1)
          echo "All security headers present."

          docker stop equipilot-security-test
          docker rm equipilot-security-test

      - name: Cleanup Docker artifacts
        run: |
          docker rmi equipilot-ai:ci-backend equipilot-ai:ci-frontend equipilot-ai:validate 2>/dev/null || true
          docker builder prune -f 2>/dev/null || true